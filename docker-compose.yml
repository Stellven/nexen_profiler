version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: profiler
      POSTGRES_PASSWORD: profiler
      POSTGRES_DB: profiler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DB_URL: postgresql+psycopg2://profiler:profiler@postgres:5432/profiler
      USER_ID: default_user
      DATA_DIR: /data/data
    volumes:
      - ./:/app
      - ./:/data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      DB_URL: postgresql+psycopg2://profiler:profiler@postgres:5432/profiler
      USER_ID: default_user
      DATA_DIR: /data/data
    volumes:
      - ./:/app
      - ./:/data
    depends_on:
      - postgres
volumes:
  pgdata:
